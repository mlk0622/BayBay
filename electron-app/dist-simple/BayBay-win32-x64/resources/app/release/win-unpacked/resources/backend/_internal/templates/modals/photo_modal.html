<!-- Modal d'upload de photo -->
<div id="photoModal" class="modal-overlay hidden">
    <div class="modal-container">
        <div class="modal-header">
            <h3 class="modal-title">Photo du locataire</h3>
            <button onclick="closeModal('photoModal')" class="modal-close">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <form id="photoForm" enctype="multipart/form-data">
            <div class="modal-body space-y-6">
                <div class="text-center">
                    <div class="w-32 h-32 mx-auto mb-4 rounded-full bg-gradient-to-r from-blue-400 to-purple-400 flex items-center justify-center overflow-hidden" id="photoPreview">
                        <svg class="w-16 h-16 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                    </div>
                    <p class="text-white/70 text-sm">Format acceptés : JPG, PNG, GIF, WebP</p>
                </div>

                <div class="form-group">
                    <label class="form-label">Choisir une photo</label>
                    <div class="file-upload-area">
                        <input type="file" name="file" id="photoFile" accept="image/*" required class="file-input" />
                        <div class="file-upload-content">
                            <svg class="w-12 h-12 text-white/30 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                            <p class="text-white/70 font-medium">Glissez votre photo ici</p>
                            <p class="text-white/50 text-sm">ou cliquez pour parcourir</p>
                        </div>
                        <div class="file-selected hidden">
                            <svg class="w-8 h-8 text-green-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                            </svg>
                            <p class="file-name text-white font-medium"></p>
                            <p class="text-white/50 text-sm">Photo sélectionnée</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" onclick="closeModal('photoModal')" class="btn btn-secondary">
                    Annuler
                </button>
                <button type="submit" class="btn btn-primary">
                    Uploader
                </button>
            </div>
        </form>
    </div>
</div>

<script>
let photoLocataireId = null;

function openPhotoModal(locataireId) {
    photoLocataireId = locataireId;
    document.getElementById('photoModal').classList.remove('hidden');

    // Réinitialiser le formulaire
    document.getElementById('photoForm').reset();
    resetPhotoUpload();
}

function resetPhotoUpload() {
    const fileInput = document.getElementById('photoFile');
    const uploadContent = document.querySelector('#photoModal .file-upload-content');
    const selectedContent = document.querySelector('#photoModal .file-selected');
    const preview = document.getElementById('photoPreview');

    fileInput.value = '';
    uploadContent.classList.remove('hidden');
    selectedContent.classList.add('hidden');

    // Remettre l'icône par défaut
    preview.innerHTML = `
        <svg class="w-16 h-16 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
    `;
}

// Gestion du file upload avec preview
document.getElementById('photoFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const uploadContent = document.querySelector('#photoModal .file-upload-content');
        const selectedContent = document.querySelector('#photoModal .file-selected');
        const fileName = document.querySelector('#photoModal .file-name');
        const preview = document.getElementById('photoPreview');

        uploadContent.classList.add('hidden');
        selectedContent.classList.remove('hidden');
        fileName.textContent = file.name;

        // Afficher aperçu de l'image
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.innerHTML = `<img src="${e.target.result}" alt="Aperçu" class="w-full h-full object-cover rounded-full">`;
        };
        reader.readAsDataURL(file);
    }
});

// Soumission du formulaire
document.getElementById('photoForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    if (!photoLocataireId) {
        showNotification('Erreur: Locataire non défini', 'error');
        return;
    }

    const formData = new FormData(this);

    try {
        const response = await fetch(`/api/locataire/${photoLocataireId}/photo`, {
            method: 'POST',
            body: formData
        });

        const result = await response.json();

        if (response.ok) {
            showNotification('Photo uploadée avec succès', 'success');
            closeModal('photoModal');
            setTimeout(() => location.reload(), 1000);
        } else {
            showNotification('Erreur: ' + result.error, 'error');
        }
    } catch (error) {
        showNotification('Erreur lors de l\'upload', 'error');
    }
});
</script>
