<div id="etatLieuxModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50" style="display:none;">
    <div class="bg-white rounded-2xl shadow-xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
        <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
            <h3 class="text-lg font-semibold text-slate-900">
                <i class="fas fa-clipboard-list text-purple-500 mr-2"></i>Nouvel État des Lieux
            </h3>
            <button onclick="closeModal('etatLieuxModal')" class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 hover:bg-slate-200">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <form id="etatLieuxForm">
            <input type="hidden" name="locataire_id" id="etatLieuxLocataireId">
            <div class="p-6 space-y-5">
                <div class="bg-blue-50 rounded-xl p-4">
                    <p class="text-blue-700 text-sm">
                        <i class="fas fa-info-circle mr-2"></i>
                        Ce formulaire crée un état des lieux pré-rempli avec les informations du locataire et du bien.
                    </p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Type d'état des lieux *</label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="flex items-center p-4 border border-slate-200 rounded-xl cursor-pointer hover:bg-slate-50 has-[:checked]:border-primary has-[:checked]:bg-primary/5">
                            <input type="radio" name="type_etat" value="Entrée" checked class="mr-3 text-primary">
                            <i class="fas fa-sign-in-alt text-green-500 mr-2"></i>
                            <span class="text-slate-900">Entrée</span>
                        </label>
                        <label class="flex items-center p-4 border border-slate-200 rounded-xl cursor-pointer hover:bg-slate-50 has-[:checked]:border-primary has-[:checked]:bg-primary/5">
                            <input type="radio" name="type_etat" value="Sortie" class="mr-3 text-primary">
                            <i class="fas fa-sign-out-alt text-orange-500 mr-2"></i>
                            <span class="text-slate-900">Sortie</span>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Date de l'état des lieux *</label>
                    <input type="date" name="date_etat" id="etatLieuxDate" required
                           class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
                </div>

                <div class="bg-slate-50 rounded-xl p-4">
                    <h4 class="font-medium text-slate-900 mb-4 flex items-center">
                        <i class="fas fa-tachometer-alt text-blue-500 mr-2"></i>
                        Relevés des compteurs
                    </h4>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs text-slate-500 mb-1">Électricité</label>
                            <input type="text" name="releve_electricite" placeholder="Ex: 12345"
                                   class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-primary">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-500 mb-1">Gaz</label>
                            <input type="text" name="releve_gaz" placeholder="Ex: 6789"
                                   class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-primary">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-500 mb-1">Eau froide</label>
                            <input type="text" name="releve_eau_froide" placeholder="Ex: 234"
                                   class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-primary">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-500 mb-1">Eau chaude</label>
                            <input type="text" name="releve_eau_chaude" placeholder="Ex: 123"
                                   class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-primary">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Observations / Remarques</label>
                    <textarea name="observations" rows="4"
                              class="w-full px-4 py-2 border border-slate-300 rounded-lg resize-none focus:ring-2 focus:ring-primary focus:border-primary"
                              placeholder="Notez ici les observations générales, réserves ou commentaires..."></textarea>
                </div>

                <div class="bg-slate-50 rounded-xl p-4">
                    <h4 class="font-medium text-slate-900 mb-2">Informations pré-remplies :</h4>
                    <div id="etatLieuxInfos" class="text-slate-500 text-sm space-y-1">
                        <!-- Filled by JavaScript -->
                    </div>
                </div>
            </div>

            <div class="px-6 py-4 border-t border-slate-200 flex justify-end gap-3">
                <button type="button" onclick="closeModal('etatLieuxModal')"
                        class="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-50">
                    Annuler
                </button>
                <button type="submit"
                        class="px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium hover:bg-primary-dark">
                    <i class="fas fa-file-pdf mr-2"></i>Générer l'état des lieux
                </button>
            </div>
        </form>
    </div>
</div>

<script>
document.getElementById('etatLieuxForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const formData = new FormData(this);
    const locataireId = formData.get('locataire_id');

    if (!locataireId) {
        showNotification('Erreur: Locataire non défini', 'error');
        return;
    }

    const data = {};
    for (let [key, value] of formData.entries()) {
        if (key !== 'locataire_id') {
            data[key] = value;
        }
    }

    try {
        const response = await fetch(`/api/locataire/${locataireId}/etat-lieux`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok) {
            if (result.pdf_generated) {
                showNotification('État des lieux généré avec PDF', 'success');
            } else {
                showNotification('État des lieux créé (sans PDF)', 'warning');
            }
            closeModal('etatLieuxModal');
            setTimeout(() => location.reload(), 1500);
        } else {
            showNotification('Erreur: ' + result.message, 'error');
        }
    } catch (error) {
        showNotification('Erreur lors de la création', 'error');
    }
});
</script>
