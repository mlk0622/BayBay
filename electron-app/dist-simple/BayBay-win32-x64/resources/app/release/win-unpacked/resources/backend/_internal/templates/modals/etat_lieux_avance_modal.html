<!-- Modal de génération avancée d'état des lieux -->
<div id="etatLieuxAvanceModal" class="modal-overlay hidden">
    <div class="modal-container max-w-4xl">
        <div class="modal-header">
            <h3 class="modal-title">Générer un état des lieux complet</h3>
            <button onclick="closeModal('etatLieuxAvanceModal')" class="modal-close">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <form id="etatLieuxAvanceForm">
            <div class="modal-body space-y-6 max-h-96 overflow-y-auto">
                <!-- Informations de base -->
                <div class="glass-light rounded-xl p-4">
                    <h4 class="text-white font-semibold mb-4 flex items-center">
                        <svg class="w-5 h-5 text-blue-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        Informations de base
                    </h4>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="form-group">
                            <label class="form-label">Type d'état des lieux *</label>
                            <div class="grid grid-cols-2 gap-3">
                                <label class="flex items-center p-3 glass-input cursor-pointer hover:bg-white/10 rounded-lg">
                                    <input type="radio" name="type_etat" value="Entrée" checked class="mr-3 accent-green-500">
                                    <div class="flex items-center">
                                        <svg class="w-4 h-4 text-green-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                                        </svg>
                                        <span class="text-white text-sm">Entrée</span>
                                    </div>
                                </label>
                                <label class="flex items-center p-3 glass-input cursor-pointer hover:bg-white/10 rounded-lg">
                                    <input type="radio" name="type_etat" value="Sortie" class="mr-3 accent-orange-500">
                                    <div class="flex items-center">
                                        <svg class="w-4 h-4 text-orange-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l4 4m0 0l-4 4m4-4H3m5-4v1a3 3 0 01-3 3H2"/>
                                        </svg>
                                        <span class="text-white text-sm">Sortie</span>
                                    </div>
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Date de l'état des lieux *</label>
                            <input type="date" name="date_etat" id="dateEtatAvance" required class="form-input" />
                        </div>
                    </div>
                </div>

                <!-- Relevés des compteurs -->
                <div class="glass-light rounded-xl p-4">
                    <h4 class="text-white font-semibold mb-4 flex items-center">
                        <svg class="w-5 h-5 text-yellow-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                        </svg>
                        Relevés des compteurs
                    </h4>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="form-group">
                            <label class="form-label">Électricité</label>
                            <input type="text" name="releve_electricite" placeholder="Ex: 12345" class="form-input" />
                        </div>
                        <div class="form-group">
                            <label class="form-label">Gaz</label>
                            <input type="text" name="releve_gaz" placeholder="Ex: 6789" class="form-input" />
                        </div>
                        <div class="form-group">
                            <label class="form-label">Eau froide</label>
                            <input type="text" name="releve_eau_froide" placeholder="Ex: 234" class="form-input" />
                        </div>
                        <div class="form-group">
                            <label class="form-label">Eau chaude</label>
                            <input type="text" name="releve_eau_chaude" placeholder="Ex: 123" class="form-input" />
                        </div>
                    </div>
                </div>

                <!-- Observations -->
                <div class="glass-light rounded-xl p-4">
                    <h4 class="text-white font-semibold mb-4 flex items-center">
                        <svg class="w-5 h-5 text-purple-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                        </svg>
                        Observations et remarques
                    </h4>

                    <div class="form-group">
                        <label class="form-label">Observations générales</label>
                        <textarea name="observations" rows="4" class="form-input resize-none"
                            placeholder="Notez ici les observations générales, réserves, défauts constatés, etc..."></textarea>
                    </div>
                </div>

                <!-- Aperçu des informations pré-remplies -->
                <div class="glass-light rounded-xl p-4">
                    <h4 class="text-white font-semibold mb-3 flex items-center">
                        <svg class="w-5 h-5 text-green-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>
                        </svg>
                        Informations pré-remplies automatiquement
                    </h4>
                    <div id="etatLieuxAvanceInfos" class="text-white/70 text-sm space-y-2">
                        <!-- Sera rempli par JavaScript -->
                    </div>
                </div>

                <!-- Options de génération -->
                <div class="glass-light rounded-xl p-4">
                    <h4 class="text-white font-semibold mb-4 flex items-center">
                        <svg class="w-5 h-5 text-pink-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                        Options de génération
                    </h4>

                    <div class="space-y-3">
                        <label class="flex items-center space-x-3">
                            <input type="checkbox" name="inclure_photos" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded">
                            <span class="text-white text-sm">Inclure un espace pour les photos</span>
                        </label>
                        <label class="flex items-center space-x-3">
                            <input type="checkbox" name="inclure_equipements" checked class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded">
                            <span class="text-white text-sm">Inclure la section état des équipements</span>
                        </label>
                        <label class="flex items-center space-x-3">
                            <input type="checkbox" name="format_detaille" checked class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded">
                            <span class="text-white text-sm">Utiliser le format détaillé (recommandé)</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" onclick="previewEtatLieux()" class="btn btn-secondary">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    Aperçu
                </button>
                <button type="submit" class="btn btn-primary">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    Générer le PDF
                </button>
            </div>
        </form>
    </div>
</div>

<script>
let etatLieuxAvanceLocataireId = null;

function openEtatLieuxAvanceModal(locataireId) {
    etatLieuxAvanceLocataireId = locataireId;
    document.getElementById('etatLieuxAvanceModal').classList.remove('hidden');

    // Set default date to today
    document.getElementById('dateEtatAvance').value = new Date().toISOString().split('T')[0];

    // Fill pre-filled info
    updateEtatLieuxAvanceInfos(locataireId);
}

function updateEtatLieuxAvanceInfos(locataireId) {
    const infosDiv = document.getElementById('etatLieuxAvanceInfos');

    // Ici on utiliserait les données du locataire depuis le serveur
    // Pour l'instant on utilise les données du template
    infosDiv.innerHTML = `
        <div class="flex items-center space-x-2">
            <span class="w-2 h-2 bg-green-400 rounded-full"></span>
            <span><strong>Locataire:</strong> {{ locataire.nom_complet }}</span>
        </div>
        {% if locataire.appartement %}
        <div class="flex items-center space-x-2">
            <span class="w-2 h-2 bg-blue-400 rounded-full"></span>
            <span><strong>Logement:</strong> {{ locataire.appartement.bien.adresse }}, Apt {{ locataire.appartement.numero_porte }}</span>
        </div>
        <div class="flex items-center space-x-2">
            <span class="w-2 h-2 bg-purple-400 rounded-full"></span>
            <span><strong>Type:</strong> {{ locataire.appartement.type_appartement }} - {{ locataire.appartement.nb_pieces }} pièces - {{ locataire.appartement.surface }}m²</span>
        </div>
        <div class="flex items-center space-x-2">
            <span class="w-2 h-2 bg-yellow-400 rounded-full"></span>
            <span><strong>Loyer:</strong> {{ locataire.appartement.loyer_mensuel }}€ + {{ locataire.appartement.charges }}€ charges</span>
        </div>
        {% endif %}
        {% if locataire.appartement.bien.sci %}
        <div class="flex items-center space-x-2">
            <span class="w-2 h-2 bg-orange-400 rounded-full"></span>
            <span><strong>Bailleur:</strong> {{ locataire.appartement.bien.sci.nom }}</span>
        </div>
        {% endif %}
    `;
}

function previewEtatLieux() {
    if (!etatLieuxAvanceLocataireId) {
        showNotification('Erreur: Locataire non défini', 'error');
        return;
    }

    showNotification('Génération de l\'aperçu...', 'info');

    // Ouvrir un nouvel onglet avec l'aperçu
    const previewUrl = `/api/locataire/${etatLieuxAvanceLocataireId}/etat-lieux/preview`;
    window.open(previewUrl, '_blank');
}

// Soumission du formulaire avancé
document.getElementById('etatLieuxAvanceForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    if (!etatLieuxAvanceLocataireId) {
        showNotification('Erreur: Locataire non défini', 'error');
        return;
    }

    const formData = new FormData(this);

    // Convertir FormData en JSON avec options spéciales
    const data = {
        type_etat: formData.get('type_etat'),
        date_etat: formData.get('date_etat'),
        releve_electricite: formData.get('releve_electricite'),
        releve_gaz: formData.get('releve_gaz'),
        releve_eau_froide: formData.get('releve_eau_froide'),
        releve_eau_chaude: formData.get('releve_eau_chaude'),
        observations: formData.get('observations'),
        // Options de génération
        inclure_photos: formData.get('inclure_photos') === 'on',
        inclure_equipements: formData.get('inclure_equipements') === 'on',
        format_detaille: formData.get('format_detaille') === 'on'
    };

    try {
        showNotification('Génération en cours...', 'info');

        const response = await fetch(`/api/locataire/${etatLieuxAvanceLocataireId}/etat-lieux/generate`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok) {
            if (result.pdf_generated) {
                showNotification('État des lieux généré avec succès ! PDF créé automatiquement.', 'success');
                // Optionnel: ouvrir le PDF
                if (result.download_url) {
                    window.open(result.download_url, '_blank');
                }
            } else {
                showNotification('État des lieux créé (erreur PDF: ' + (result.pdf_error || 'inconnue') + ')', 'warning');
            }
            closeModal('etatLieuxAvanceModal');
            setTimeout(() => location.reload(), 1500);
        } else {
            showNotification('Erreur: ' + result.message, 'error');
        }
    } catch (error) {
        showNotification('Erreur lors de la génération', 'error');
        console.error(error);
    }
});
</script>
