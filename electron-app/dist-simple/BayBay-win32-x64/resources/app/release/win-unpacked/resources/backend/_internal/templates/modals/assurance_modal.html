<div id="assuranceModal" class="fixed inset-0 modal-overlay hidden items-center justify-center z-50">
    <div class="modal-content p-6 w-full max-w-md mx-4 max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold text-white">
                <i class="fas fa-shield-alt text-green-400 mr-2"></i>
                Attestation d'assurance
            </h3>
            <button onclick="closeModal('assuranceModal')" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-all">
                <i class="fas fa-times text-white/70"></i>
            </button>
        </div>

        <form id="assuranceForm" enctype="multipart/form-data" class="space-y-5">
            <input type="hidden" name="locataire_id" id="assuranceLocataireId">

            <div class="glass-light rounded-2xl p-4 text-center">
                <div id="assuranceDropzone" class="border-2 border-dashed border-white/20 rounded-xl p-8 hover:border-purple-400/50 transition-all cursor-pointer">
                    <i class="fas fa-cloud-upload-alt text-4xl text-white/30 mb-4"></i>
                    <p class="text-white/60 mb-2">Glissez votre fichier PDF ici</p>
                    <p class="text-white/40 text-sm">ou cliquez pour sélectionner</p>
                    <input type="file" name="file" id="assuranceFile" accept=".pdf" class="hidden">
                </div>
                <p id="assuranceFileName" class="mt-3 text-green-400 hidden">
                    <i class="fas fa-check-circle mr-2"></i>
                    <span></span>
                </p>
            </div>

            <div>
                <label class="block text-sm font-semibold text-white/70 mb-2">Date de validité</label>
                <input type="date" name="date_validite" id="assuranceDateValidite" class="w-full px-4 py-3 glass-input">
                <p class="text-white/40 text-xs mt-1">Optionnel - Date d'expiration de l'attestation</p>
            </div>

            <button type="submit" class="w-full ios-button-success text-white font-semibold py-3 px-4">
                <i class="fas fa-upload mr-2"></i>Enregistrer l'attestation
            </button>
        </form>
    </div>
</div>

<script>
let assuranceLocataireId = null;

function openAssuranceModal(locataireId) {
    assuranceLocataireId = locataireId;
    document.getElementById('assuranceLocataireId').value = locataireId;
    document.getElementById('assuranceModal').classList.remove('hidden');
    document.getElementById('assuranceModal').classList.add('flex');

    // Reset form
    document.getElementById('assuranceForm').reset();
    document.getElementById('assuranceFileName').classList.add('hidden');
}

document.addEventListener('DOMContentLoaded', function() {
    const dropzone = document.getElementById('assuranceDropzone');
    const fileInput = document.getElementById('assuranceFile');
    const fileName = document.getElementById('assuranceFileName');

    if (dropzone) {
        dropzone.addEventListener('click', () => fileInput.click());

        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('border-purple-400/50');
        });

        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('border-purple-400/50');
        });

        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('border-purple-400/50');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                showFileName(e.dataTransfer.files[0].name);
            }
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) {
                showFileName(fileInput.files[0].name);
            }
        });

        function showFileName(name) {
            fileName.querySelector('span').textContent = name;
            fileName.classList.remove('hidden');
        }
    }

    // Soumission du formulaire
    const form = document.getElementById('assuranceForm');
    if (form) {
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!assuranceLocataireId) {
                showNotification('Erreur: Locataire non défini', 'error');
                return;
            }

            const formData = new FormData(this);

            try {
                const response = await fetch(`/api/locataire/${assuranceLocataireId}/assurance`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    showNotification('Attestation d\'assurance enregistrée', 'success');
                    closeModal('assuranceModal');
                    setTimeout(() => location.reload(), 1000);
                } else {
                    showNotification('Erreur: ' + (result.error || 'Erreur inconnue'), 'error');
                }
            } catch (error) {
                showNotification('Erreur lors de l\'upload', 'error');
            }
        });
    }
});
</script>
