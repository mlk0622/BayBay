<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bay Bay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #12161f 0%, #1a2130 48%, #2a3347 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            color: #f3f7ff;
            overflow: hidden;
        }

        /* Effets de fond */
        body::before,
        body::after {
            content: "";
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            width: 200px;
            height: 200px;
            top: -50px;
            right: -30px;
            background: rgba(100, 116, 139, 0.3);
        }

        body::after {
            width: 150px;
            height: 150px;
            left: -40px;
            bottom: -30px;
            background: rgba(100, 116, 139, 0.25);
        }

        .splash-container {
            position: relative;
            z-index: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #64748b 0%, #475569 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 8px 24px rgba(100, 116, 139, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #f3f7ff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .version {
            font-size: 13px;
            color: rgba(203, 213, 225, 0.7);
            margin-top: 6px;
            font-weight: 500;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .progress-container {
            width: 200px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 30%;
            background: linear-gradient(90deg, #64748b, #94a3b8);
            border-radius: 3px;
            animation: loading 1.5s ease-in-out infinite;
        }

        @keyframes loading {
            0% {
                width: 0%;
                margin-left: 0%;
            }
            50% {
                width: 40%;
                margin-left: 30%;
            }
            100% {
                width: 0%;
                margin-left: 100%;
            }
        }

        .loading-text {
            font-size: 13px;
            color: rgba(203, 213, 225, 0.8);
            font-weight: 500;
        }

        .dots {
            display: inline-block;
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        .dots::after {
            content: '';
            animation: dots-content 1.5s steps(4, end) infinite;
        }

        @keyframes dots-content {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75%, 100% { content: '...'; }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="logo-container">
            <div class="icon">🏠</div>
            <div class="title">Bay Bay</div>
            <div class="version">Version 2.4.5.8.8.7.6.5.4.3.2.1</div>
        </div>
        <div class="loading">
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
            <div class="loading-text">Chargement<span class="dots"></span></div>
        </div>
    </div>
</body>
</html>
