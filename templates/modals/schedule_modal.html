<!-- Modal de programmation d'appel de loyer -->
<div id="scheduleModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50" style="display:none;">
    <div class="bg-white rounded-2xl shadow-xl max-w-3xl w-full mx-4 max-h-[90vh] overflow-y-auto">
        <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
            <h3 class="text-lg font-semibold text-slate-900">
                <i class="fas fa-calendar-alt text-purple-500 mr-2"></i>Programmer un Appel de Loyer
            </h3>
            <button onclick="closeScheduleModal()" class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 hover:bg-slate-200">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <form id="scheduleForm">
            <input type="hidden" id="schedule_locataire_id" name="locataire_id">
            <div class="p-6 space-y-4">
                <!-- Locataire -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Locataire</label>
                    <input type="text" id="schedule_locataire_nom" readonly
                           class="w-full px-4 py-2 bg-slate-50 border border-slate-300 rounded-lg text-slate-700">
                </div>

                <!-- Email du locataire -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Email du locataire</label>
                    <input type="email" id="schedule_locataire_email" readonly
                           class="w-full px-4 py-2 bg-slate-50 border border-slate-300 rounded-lg text-slate-700">
                </div>

                <!-- Email expéditeur -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Email expéditeur (optionnel)</label>
                    <input type="email" id="email_expediteur" name="email_expediteur"
                           class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary"
                           placeholder="Laissez vide pour utiliser la config par défaut">
                    <p class="text-slate-400 text-xs mt-1">Si vide, utilise la configuration par défaut.</p>
                </div>

                <!-- Date et heure d'envoi -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Date</label>
                        <input type="date" id="schedule_date" name="date_envoi_date" required
                               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Heure</label>
                        <input type="time" id="schedule_time" name="date_envoi_time" required
                               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
                    </div>
                </div>

                <!-- Message personnalisé -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Message personnalisé (optionnel)</label>
                    <div class="rich-editor-shell" data-target="schedule_message">
                        <div class="rich-editor-toolbar">
                            <button type="button" data-command="bold"><strong>B</strong></button>
                            <button type="button" data-command="italic"><em>I</em></button>
                            <button type="button" data-command="underline"><u>U</u></button>
                            <button type="button" data-command="insertUnorderedList"><i class="fas fa-list-ul"></i></button>
                            <button type="button" data-command="removeFormat">Tx</button>
                            <select data-variable-select aria-label="Variables du mail"></select>
                            <button type="button" data-insert-variable>Insérer</button>
                            <label title="Couleur du texte">
                                <input type="color" data-command="foreColor" value="#111827">
                            </label>
                            <select data-command="fontName" aria-label="Police du mail" title="Police">
                                <option value="Arial">Arial</option>
                                <option value="Verdana">Verdana</option>
                                <option value="Tahoma">Tahoma</option>
                                <option value="Trebuchet MS">Trebuchet</option>
                                <option value="Georgia">Georgia</option>
                                <option value="Times New Roman">Times New Roman</option>
                                <option value="Courier New">Courier New</option>
                            </select>
                        </div>
                        <div id="scheduleMessageEditor" class="rich-editor-area" contenteditable="true" data-placeholder="Rédigez ici le message personnalisé..."></div>
                        <textarea id="schedule_message" name="message" class="hidden"></textarea>
                    </div>
                </div>
            </div>

            <div class="px-6 py-4 border-t border-slate-200 flex justify-end gap-3">
                <button type="button" onclick="previewScheduleMessage()"
                        class="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-50">
                    <i class="fas fa-eye mr-2"></i>Aperçu
                </button>
                <button type="button" onclick="closeScheduleModal()"
                        class="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-50">
                    Annuler
                </button>
                <button type="submit"
                        class="px-4 py-2 bg-purple-500 text-white rounded-lg text-sm font-medium hover:bg-purple-600">
                    <i class="fas fa-calendar-check mr-2"></i>Programmer
                </button>
            </div>
        </form>
    </div>
</div>

<script>
function openScheduleModal(locataireId, locataireNom, locataireEmail) {
    document.getElementById('schedule_locataire_id').value = locataireId;
    document.getElementById('schedule_locataire_nom').value = locataireNom;
    document.getElementById('schedule_locataire_email').value = locataireEmail;

    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    document.getElementById('schedule_date').value = tomorrow.toISOString().split('T')[0];
    document.getElementById('schedule_time').value = '09:00';

    const modal = document.getElementById('scheduleModal');
    modal.classList.remove('hidden');
    modal.style.display = 'flex';
}

function closeScheduleModal() {
    const modal = document.getElementById('scheduleModal');
    modal.classList.add('hidden');
    modal.style.display = 'none';
    document.getElementById('scheduleForm').reset();
    if (window.setRichTextEditorValue) {
        setRichTextEditorValue('schedule_message', '');
    }
}

function previewScheduleMessage() {
    const contenu = window.getRichTextEditorValue ? getRichTextEditorValue('schedule_message') : (document.getElementById('schedule_message').value || '');
    const nom = document.getElementById('schedule_locataire_nom').value || 'locataire';
    const body = contenu || '<p>Aucun message personnalisé saisi.</p>';

    if (window.openEmailPreviewModal) {
        openEmailPreviewModal('Aperçu - Message de programmation', `Message pour ${nom}`, body);
        return;
    }

    showNotification('Prévisualisation indisponible', 'warning');
}

document.getElementById('scheduleForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const formData = new FormData(this);
    const today = new Date();
    const nextMonth = new Date(today.getFullYear(), today.getMonth() + 1);

    const data = {
        locataire_id: parseInt(document.getElementById('schedule_locataire_id').value),
        locataires_ids: [parseInt(document.getElementById('schedule_locataire_id').value)],
        email_expediteur: formData.get('email_expediteur'),
        date_envoi: formData.get('date_envoi_date'),
        heure_envoi: formData.get('date_envoi_time'),
        mois: nextMonth.getMonth() + 1,
        annee: nextMonth.getFullYear(),
        message: window.getRichTextEditorValue ? getRichTextEditorValue('schedule_message') : formData.get('message'),
        recurrent: false,
        tous_locataires: false
    };

    try {
        const response = await fetch('/api/programmation-appel', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if (response.ok) {
            closeScheduleModal();
            showNotification('Appel de loyer programmé', 'success');
            setTimeout(() => location.reload(), 1000);
        } else {
            const error = await response.json();
            showNotification('Erreur: ' + error.message, 'error');
        }
    } catch (error) {
        showNotification('Erreur lors de la programmation', 'error');
    }
});
</script>
