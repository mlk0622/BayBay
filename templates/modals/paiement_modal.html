<div id="paiementModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50" style="display:none;">
    <div class="bg-white rounded-2xl shadow-xl max-w-md w-full mx-4 max-h-[90vh] overflow-y-auto">
        <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
            <h3 class="text-lg font-semibold text-slate-900">
                <i class="fas fa-euro-sign text-green-500 mr-2"></i>Enregistrer un paiement
            </h3>
            <button onclick="closeModal('paiementModal')" class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 hover:bg-slate-200">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <form id="paiementForm">
            <input type="hidden" name="locataire_id" id="paiementLocataireId">
            <div class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Mois *</label>
                        <select name="mois" id="paiementMois" required
                                class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
                            <option value="1">Janvier</option>
                            <option value="2">Février</option>
                            <option value="3">Mars</option>
                            <option value="4">Avril</option>
                            <option value="5">Mai</option>
                            <option value="6">Juin</option>
                            <option value="7">Juillet</option>
                            <option value="8">Août</option>
                            <option value="9">Septembre</option>
                            <option value="10">Octobre</option>
                            <option value="11">Novembre</option>
                            <option value="12">Décembre</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Année *</label>
                        <input type="number" name="annee" id="paiementAnnee" required min="2020" max="2030"
                               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Montant payé (€) *</label>
                    <input type="number" name="montant_paye" id="paiementMontant" step="0.01" min="0" required
                           class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary"
                           placeholder="850.00">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Date de paiement</label>
                    <input type="date" name="date_paiement" id="paiementDate"
                           class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Mode de paiement</label>
                    <select name="mode_paiement" id="paiementMode"
                            class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
                        <option value="">-- Sélectionner --</option>
                        <option value="Virement">Virement</option>
                        <option value="Chèque">Chèque</option>
                        <option value="Espèces">Espèces</option>
                        <option value="Prélèvement">Prélèvement</option>
                    </select>
                </div>
            </div>
            <div class="px-6 py-4 border-t border-slate-200 flex justify-end gap-3">
                <button type="button" onclick="closeModal('paiementModal')"
                        class="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-50">
                    Annuler
                </button>
                <button type="submit"
                        class="px-4 py-2 bg-green-500 text-white rounded-lg text-sm font-medium hover:bg-green-600">
                    <i class="fas fa-check mr-2"></i>Enregistrer
                </button>
            </div>
        </form>
    </div>
</div>
