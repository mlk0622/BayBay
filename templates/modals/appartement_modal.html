<div id="appartModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50" style="display:none;">
    <div class="bg-white rounded-2xl shadow-xl max-w-md w-full mx-4 max-h-[90vh] overflow-y-auto">
        <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
            <h3 class="text-lg font-semibold text-slate-900" id="appartModalTitle">
                <i class="fas fa-door-open text-purple-500 mr-2"></i>Nouvel Appartement
            </h3>
            <button onclick="closeModal('appartModal')" class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 hover:bg-slate-200">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <form id="appartForm">
            <input type="hidden" name="bien_id" id="appartBienId">
            <input type="hidden" name="appart_id" id="appartEditId">
            <div class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">N° de porte *</label>
                        <input type="text" name="numero_porte" id="appartNumero" required
                               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary"
                               placeholder="A1">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Type *</label>
                        <select name="type_appartement" id="appartType" required
                                class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
                            <option value="Studio">Studio</option>
                            <option value="T1">T1</option>
                            <option value="T2">T2</option>
                            <option value="T3">T3</option>
                            <option value="T4">T4</option>
                            <option value="T5+">T5+</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Surface (m²)</label>
                        <input type="number" name="surface" id="appartSurface" step="0.01" min="0"
                               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary"
                               placeholder="45">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Étage</label>
                        <input type="text" name="etage" id="appartEtage"
                               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary"
                               placeholder="3ème">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Loyer mensuel (€)</label>
                        <input type="number" name="loyer_mensuel" id="appartLoyer" step="0.01" min="0"
                               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary"
                               placeholder="800">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Charges (€)</label>
                        <input type="number" name="charges" id="appartCharges" step="0.01" min="0"
                               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary"
                               placeholder="50">
                    </div>
                </div>
            </div>
            <div class="px-6 py-4 border-t border-slate-200 flex justify-end gap-3">
                <button type="button" onclick="closeModal('appartModal')"
                        class="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-50">
                    Annuler
                </button>
                <button type="submit"
                        class="px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium hover:bg-primary-dark">
                    <i class="fas fa-check mr-2"></i>Enregistrer
                </button>
            </div>
        </form>
    </div>
</div>
