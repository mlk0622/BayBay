<div id="deleteModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50" style="display:none;">
    <div class="bg-white rounded-2xl shadow-xl max-w-sm w-full mx-4">
        <div class="p-6 text-center">
            <div class="w-16 h-16 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-trash-alt text-2xl text-red-500"></i>
            </div>
            <h3 class="text-xl font-bold text-slate-900 mb-2">Confirmer la suppression</h3>
            <p class="text-slate-500 mb-6" id="deleteMessage">Êtes-vous sûr de vouloir supprimer cet élément ?</p>
            <input type="hidden" id="deleteType">
            <input type="hidden" id="deleteId">
            <div class="flex gap-3">
                <button onclick="closeModal('deleteModal')"
                        class="flex-1 px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-50">
                    Annuler
                </button>
                <button onclick="confirmDelete()"
                        class="flex-1 px-4 py-2 bg-red-500 text-white rounded-lg text-sm font-medium hover:bg-red-600">
                    Supprimer
                </button>
            </div>
        </div>
    </div>
</div>
