<div id="choixAjoutModal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/70 p-4">
    <div class="glass-card w-full max-w-sm p-6 space-y-4">
        <div class="flex items-start justify-between gap-4">
            <h3 class="text-xl font-semibold text-white">Ajouter</h3>
            <button type="button" onclick="closeModal('choixAjoutModal')" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-white hover:bg-white/20">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <button onclick="closeModal('choixAjoutModal'); openBienModal(null)"
                    class="flex flex-col items-center p-4 rounded-xl bg-white/10 hover:bg-white/20 text-white transition-all">
                <svg class="w-8 h-8 mb-2 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                <span class="text-sm font-medium">Bien direct</span>
                <span class="text-xs text-white/50 mt-1">Particulier</span>
            </button>
            <button onclick="closeModal('choixAjoutModal'); openSciChoiceModal()"
                    class="flex flex-col items-center p-4 rounded-xl bg-white/10 hover:bg-white/20 text-white transition-all">
                <svg class="w-8 h-8 mb-2 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                </svg>
                <span class="text-sm font-medium">Via SCI</span>
                <span class="text-xs text-white/50 mt-1">Nouvelle ou existante</span>
            </button>
        </div>
    </div>
</div>

<div id="choixSciModal" class="fixed inset-0 z-[101] hidden items-center justify-center bg-black/70 p-4">
    <div class="glass-card w-full max-w-lg p-6 space-y-4">
        <div class="flex items-start justify-between gap-4">
            <h3 class="text-xl font-semibold text-white">Ajouter un bien via SCI</h3>
            <button type="button" onclick="closeModal('choixSciModal')" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-white hover:bg-white/20">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        {% if scis %}
        <div class="max-h-72 overflow-y-auto space-y-2 pr-1">
            {% for sci in scis %}
            <button type="button"
                    onclick="selectSciForNewBien({{ sci.id }})"
                    class="w-full text-left p-3 rounded-xl bg-white/10 hover:bg-white/20 transition-all text-white">
                <div class="font-medium">{{ sci.nom }}</div>
                <div class="text-xs text-white/60">{{ sci.ville or 'Ville non renseignée' }}</div>
            </button>
            {% endfor %}
        </div>
        {% else %}
        <p class="text-white/70 text-sm">Aucune SCI trouvée. Créez d'abord votre SCI, puis ajoutez-y un bien.</p>
        {% endif %}

        <div class="flex items-center justify-end gap-3 pt-2">
            <button type="button" onclick="closeModal('choixSciModal')" class="px-4 py-2 rounded-lg border border-white/20 text-white/80 hover:text-white">
                Annuler
            </button>
            <button type="button" onclick="closeModal('choixSciModal'); openModal('sciModal')" class="ios-button text-white px-4 py-2">
                Nouvelle SCI
            </button>
        </div>
    </div>
</div>
