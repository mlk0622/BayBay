<div id="locataireModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50" style="display:none;">
    <div class="bg-white rounded-2xl shadow-xl max-w-lg w-full mx-4 max-h-[90vh] overflow-y-auto">
        <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
            <h3 class="text-lg font-semibold text-slate-900" id="locataireModalTitle">
                <i class="fas fa-user text-primary mr-2"></i>Nouveau Locataire
            </h3>
            <button onclick="closeModal('locataireModal')" class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 hover:bg-slate-200">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <form id="locataireForm">
            <input type="hidden" name="locataire_id" id="locataireEditId">
            <div class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Nom *</label>
                        <input type="text" name="nom" id="locataireNom" required
                               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary"
                               placeholder="Dupont">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Prénom *</label>
                        <input type="text" name="prenom" id="locatairePrenom" required
                               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary"
                               placeholder="Jean">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Email</label>
                        <input type="email" name="email" id="locataireEmail"
                               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary"
                               placeholder="jean.dupont@email.fr">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Téléphone</label>
                        <input type="tel" name="telephone" id="locataireTelephone"
                               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary"
                               placeholder="06 12 34 56 78">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Adresse précédente</label>
                    <input type="text" name="adresse_precedente" id="locataireAdresse"
                           class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary"
                           placeholder="Ancienne adresse">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Dépôt de garantie (€)</label>
                    <input type="number" name="depot_garantie" id="locataireDepot" step="0.01" min="0"
                           class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary"
                           placeholder="850">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Début du bail</label>
                        <input type="date" name="date_debut_bail" id="locataireDebutBail"
                               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Fin du bail</label>
                        <input type="date" name="date_fin_bail" id="locataireFinBail"
                               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Statut</label>
                        <select name="statut" id="locataireStatut"
                                class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
                            <option value="Actif">Actif</option>
                            <option value="Inactif">Inactif</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Appartement</label>
                        <select name="appartement_id" id="locataireAppartement"
                                class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
                            <option value="">-- Non attribué --</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="px-6 py-4 border-t border-slate-200 flex justify-end gap-3">
                <button type="button" onclick="closeModal('locataireModal')"
                        class="px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-50">
                    Annuler
                </button>
                <button type="submit"
                        class="px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium hover:bg-primary-dark">
                    <i class="fas fa-check mr-2"></i>Enregistrer
                </button>
            </div>
        </form>
    </div>
</div>
